services:
  storage-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: storage-api:latest
    container_name: storage-api
    env_file:
      - .env
    ports:
      - "${APP_PORT:-3000}:${APP_PORT:-3000}"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
